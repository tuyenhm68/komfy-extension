<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Komfy Flow Test Runner</title>
<style>
body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
h2 { color: #00d4ff; }
.pass { color: #4caf50; font-weight: bold; }
.fail { color: #f44336; font-weight: bold; }
.info { color: #2196f3; }
.sep  { color: #ff9800; font-weight: bold; margin-top: 12px; border-top: 1px solid #333; padding-top: 8px; }
#log { background: #0d0d1a; border: 1px solid #333; padding: 12px; border-radius: 8px; white-space: pre-wrap; max-height: 80vh; overflow-y: auto; }
button { background: #00d4ff; color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 8px 4px; font-weight: bold; }
button:hover { background: #00aabb; }
input { background: #1a1a2e; border: 1px solid #555; color: #eee; padding: 8px; border-radius: 4px; width: 400px; }
label { color: #aaa; display: block; margin: 6px 0 2px; }
</style>
</head>
<body>
<h2>🔬 Komfy Flow Test Runner v2.0.32</h2>
<p style="color:#aaa">Mo tab Google Flow project, sau do bam Run Test. Test se chay qua extension bridge.</p>

<div style="margin:12px 0">
  <label>Flow Tab URL (copy paste tu browser):</label>
  <input type="text" id="flowUrl" placeholder="https://labs.google/fx/tools/flow/project/..." value="">
</div>

<div>
  <button onclick="runTest('survey')">📋 1. Survey DOM</button>
  <button onclick="runTest('swap')">🔄 2. Find Swap Button</button>
  <button onclick="runTest('popover')">📦 3. Open Popover</button>
  <button onclick="runTest('slot')">🖼️ 4. Click Start Slot</button>
  <button onclick="runAll()">🚀 Run ALL</button>
  <button onclick="clearLog()">🗑️ Clear</button>
</div>

<div id="log">Cho... bam Run de bat dau.\n</div>

<script>
var L = document.getElementById('log');

function log(cls, msg) {
  var span = document.createElement('span');
  span.className = cls;
  span.textContent = msg + '\n';
  L.appendChild(span);
  L.scrollTop = L.scrollHeight;
}
function clearLog() { L.innerHTML = ''; }

// Chay JS trong tab Flow qua chrome.tabs API (can extension)
// Vi day chay o file:// nen dung localhost proxy neu co, hoac copy output thu cong

// Cac doan JS ngan de user chay tu tay trong Flow tab console
var TESTS = {
  survey: "(function(){\
var btns = document.querySelectorAll('button,[role=\"button\"]');\
var res = Array.from(btns).filter(function(b){\
  var r=b.getBoundingClientRect();\
  return r.bottom>window.innerHeight-150&&r.height>0&&r.width>0;\
}).map(function(b,i){\
  var r=b.getBoundingClientRect();\
  return i+'|w='+Math.round(r.width)+'|aria='+(b.getAttribute('aria-label')||'')+'|t='+(b.textContent||'').trim().substring(0,25);\
});\
console.log('[SURVEY]',res.join('\\n'));\
return res;\
})()",

  swap: "(function(){\
var s=document.querySelector('[aria-label*=\"Swap\"],[aria-label*=\"swap\"],[aria-label*=\"first and last\"]');\
if(!s) s=Array.from(document.querySelectorAll('button,[role=\"button\"]')).find(function(b){\
  var r=b.getBoundingClientRect(),t=(b.textContent||'').toLowerCase();\
  return r.bottom>window.innerHeight-150&&r.height>0&&(t.includes('swap')||t.includes('horiz'));\
});\
if(!s){console.log('[SWAP] not found');return null;}\
var ch=Array.from(s.parentElement.children),si=ch.indexOf(s);\
var info=ch.map(function(c,i){return i+'['+c.tagName+']='+(c.textContent||'').trim().substring(0,15)+'|cls='+(c.className||'').substring(0,20);});\
console.log('[SWAP] found. aria='+(s.getAttribute('aria-label')||''),t=(s.textContent||'').trim().substring(0,30));\
console.log('[SWAP] siblings:',info.join(' | '));\
return {found:true,aria:(s.getAttribute('aria-label')||''),siblings:info};\
})()",

  popover: "(async function(){\
function trigger(el){\
  if(!el)return;\
  el.dispatchEvent(new PointerEvent('pointerover',{bubbles:true,composed:true}));\
  el.dispatchEvent(new PointerEvent('pointerdown',{bubbles:true,cancelable:true,composed:true,isPrimary:true}));\
  el.dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true,button:0}));\
  el.dispatchEvent(new PointerEvent('pointerup',{bubbles:true,cancelable:true,composed:true,isPrimary:true}));\
  el.dispatchEvent(new MouseEvent('mouseup',{bubbles:true,cancelable:true,button:0}));\
  el.dispatchEvent(new MouseEvent('click',{bubbles:true,cancelable:true,button:0}));\
}\
var btns=Array.from(document.querySelectorAll('button,[role=\"button\"]')).filter(function(b){\
  var r=b.getBoundingClientRect(),t=(b.textContent||'').toLowerCase(),a=(b.getAttribute('aria-label')||'').toLowerCase();\
  return r.bottom>window.innerHeight-150&&r.width>60&&!t.includes('arrow_forward')&&!a.includes('create')&&!t.includes('create');\
});\
var btn=btns[0];\
if(!btn){console.log('[POPOVER] no model btn');return;}\
console.log('[POPOVER] clicking:\"'+(btn.textContent||'').trim().substring(0,30)+'\"');\
trigger(btn);\
await new Promise(function(r){setTimeout(r,1000);});\
var pop=document.querySelector('[data-radix-popper-content-wrapper]');\
if(pop){\
  var tabs=Array.from(pop.querySelectorAll('[role=\"tab\"]')).map(function(t){return (t.textContent||'').trim()+'[sel='+t.getAttribute('aria-selected')+']';});\
  console.log('[POPOVER] OPENED! tabs:',tabs.join(','));\
  document.body.click();\
}else{\
  console.log('[POPOVER] FAILED - not opened');\
}\
})()",

  slot: "(async function(){\
function trigger(el){\
  if(!el)return;\
  el.dispatchEvent(new PointerEvent('pointerdown',{bubbles:true,cancelable:true,composed:true,isPrimary:true}));\
  el.dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true,button:0}));\
  el.dispatchEvent(new PointerEvent('pointerup',{bubbles:true,cancelable:true,composed:true,isPrimary:true}));\
  el.dispatchEvent(new MouseEvent('mouseup',{bubbles:true,cancelable:true,button:0}));\
  el.dispatchEvent(new MouseEvent('click',{bubbles:true,cancelable:true,button:0}));\
}\
var s=document.querySelector('[aria-label*=\"Swap\"],[aria-label*=\"swap\"],[aria-label*=\"first and last\"]');\
if(!s)s=Array.from(document.querySelectorAll('button')).find(function(b){\
  var r=b.getBoundingClientRect(),t=(b.textContent||'').toLowerCase();\
  return r.bottom>window.innerHeight-150&&r.height>0&&(t.includes('swap')||t.includes('horiz'));\
});\
if(!s){console.log('[SLOT] no swap');return;}\
var ch=Array.from(s.parentElement.children),si=ch.indexOf(s),slot=si>0?ch[si-1]:null;\
if(!slot){console.log('[SLOT] no start sibling');return;}\
console.log('[SLOT] clicking start: tag='+slot.tagName+' text=\"'+(slot.textContent||'').trim()+'\"');\
trigger(slot);\
await new Promise(function(r){setTimeout(r,1300);});\
var imgs=Array.from(document.querySelectorAll('img')).filter(function(img){\
  var r=img.getBoundingClientRect();\
  return r.top<window.innerHeight*0.85&&r.width>40&&r.height>40;\
});\
console.log('[SLOT] gallery imgs:',imgs.length);\
if(imgs.length>0)document.dispatchEvent(new KeyboardEvent('keydown',{key:'Escape',bubbles:true}));\
})()"
};

function showCode(testName) {
  log('sep', '\n=== CODE CHO TEST: ' + testName.toUpperCase() + ' ===');
  log('info', 'Copy doan sau, paste vao Console cua tab Flow:\n');
  log('', TESTS[testName]);
  log('info', '\n(Hoac chay nut ben duoi neu extension cho phep)');
}

function runTest(testName) {
  clearLog();
  log('sep', '=== ' + testName.toUpperCase() + ' ===');
  log('info', 'Copy doan JS sau va paste vao DevTools Console cua tab Google Flow:\n');
  log('', '─'.repeat(60) + '\n');
  log('', TESTS[testName]);
  log('', '\n' + '─'.repeat(60));
  log('info', '\nSau khi chay, paste ket qua console vao day de phan tich.');
}

function runAll() {
  clearLog();
  log('sep', '=== CHAY TUNG BUOC - COPY PASTE VAO FLOW CONSOLE ===\n');
  log('info', 'BUOC 1 - Survey DOM:');
  log('', TESTS.survey + '\n');
  log('info', '\nBUOC 2 - Find Swap:');
  log('', TESTS.swap + '\n');
  log('info', '\nBUOC 3 - Open Popover:');
  log('', TESTS.popover + '\n');
  log('info', '\nBUOC 4 - Click Slot:');
  log('', TESTS.slot);
}
</script>
</body>
</html>
