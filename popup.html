<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Komfy Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      background: #0f1117;
      color: #e0e0e0;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1e2030;
    }
    .header img { width: 22px; height: 22px; border-radius: 4px; }
    .header h1 { font-size: 14px; font-weight: 600; color: #fff; letter-spacing: 0.2px; }
    .header .version-tag {
      font-size: 10px;
      color: #5a606e;
      font-weight: 400;
      margin-left: -4px;
      align-self: center;
    }
    .header .spacer { flex: 1; }
    .btn-sync-small {
      background: transparent;
      border: 1px solid #2e3144;
      color: #8b909a;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-sync-small:hover {
      background: #1e2030;
      color: #e0e0e0;
      border-color: #3d4250;
    }
    .btn-sync-small:active { transform: scale(0.96); }
    .btn-sync-small.success {
      border-color: #22c55e;
      color: #22c55e;
    }

    /* Reload button (shown when update delivered via Komfy Studio) */
    .btn.reload {
      display: none;
      background: #22c55e;
      margin-top: 0;
    }
    .btn.reload:hover { background: #16a34a; }

    /* Manual reload button - always visible */
    .btn-reload-manual {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px 12px;
      padding: 7px;
      background: transparent;
      color: #f59e0b;
      border: 1px solid #f59e0b55;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.2px;
    }
    .btn-reload-manual:hover { background: #f59e0b22; border-color: #f59e0b; }
    .btn-reload-manual:active { transform: scale(0.97); }
    .divider { height: 1px; background: #1e2030; margin: 4px 0; }

    /* Status dot */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid #1e2030;
    }
    .status-label { font-size: 12px; color: #8b909a; }
    .badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.red    { background: #ef4444; }
    .dot.yellow { background: #f59e0b; }

    /* Info block */
    .info-block {
      padding: 10px 16px;
      border-bottom: 1px solid #1e2030;
    }
    .info-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }
    .info-key { font-size: 11px; color: #8b909a; }
    .info-val {
      font-size: 11px;
      font-family: 'Courier New', monospace;
      color: #a5b4fc;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }
    .info-val.ok  { color: #22c55e; font-family: inherit; }
    .info-val.err { color: #ef4444; font-family: inherit; }

    /* Button */
    .btn {
      display: block;
      width: calc(100% - 32px);
      margin: 12px 16px;
      padding: 8px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.2px;
    }
    .btn { background: #6366f1; }
    .btn:hover { background: #4f46e5; }
    .btn:active { transform: scale(0.98); }
    .btn.success { background: #22c55e; }

  </style>
</head>
<body>

  <div class="header">
    <img src="icon-32.png" alt="icon">
    <h1>Komfy Bridge</h1>
    <span class="version-tag" id="version-tag"></span>
    <div class="spacer"></div>
    <button class="btn-sync-small" id="btn-sync" title="Force Sync">↻ Sync</button>
  </div>



  <div class="status-row">
    <span class="status-label">Komfy Studio</span>
    <span class="badge">
      <span class="dot" id="dot-studio"></span>
      <span id="studio-status">Checking...</span>
    </span>
  </div>

  <div class="status-row">
    <span class="status-label">Google Session</span>
    <span class="badge">
      <span class="dot" id="dot-token"></span>
      <span id="token-status">No token</span>
    </span>
  </div>

  <div class="info-block">
    <div class="info-item">
      <span class="info-key">Project</span>
      <span class="info-val" id="project-name">—</span>
    </div>
    <div class="info-item">
      <span class="info-key">ID</span>
      <span class="info-val" id="project-id" style="font-size:10px;opacity:0.6">—</span>
    </div>
    <div class="info-item">
      <span class="info-key">Last sync</span>
      <span class="info-val" id="last-sync">—</span>
    </div>
  </div>

  <button class="btn reload" id="btn-reload">↻ Reload to update</button>

  <div class="divider"></div>
  <button class="btn-reload-manual" id="btn-reload-manual" title="Reload extension sau khi update code">🔄 Reload Extension (v<span id="ver"></span>)</button>

  <script src="popup.js"></script>
</body>
</html>
